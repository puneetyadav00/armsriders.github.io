<!DOCTYPE html>
<html>
<head>
<title>AR Dashboard</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:30px;
}

h1{
color:red;
}

.card{
background:#111;
border:2px solid red;
padding:20px;
margin:20px 0;
border-radius:12px;
}
input{

width:100%;
padding:12px;
margin-top:8px;
background:#000;
color:white;
border:2px solid red;
border-radius:8px;
}
label{
color:red;
font-weight:bold;
}
button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<script>

function saveTournament(){

localStorage.setItem("tname",document.getElementById("tname").value);

localStorage.setItem("fee",document.getElementById("fee").value);

localStorage.setItem("prize",document.getElementById("prize").value);

localStorage.setItem("roomid",document.getElementById("roomid").value);

localStorage.setItem("roompass",document.getElementById("roompass").value);

alert("Tournament Saved Successfully");

}

</script>
<body>

<h1>👑 ARMS RIDERS DASHBOARD</h1>

<div class="card">
<h2>🏆 Tournament</h2>
<p>Edit tournament details (coming in next part).</p>
</div>

<div class="card">
<h2>📢 Announcement</h2>
<p>Edit announcements (coming in next part).</p>
</div>

<div class="card">
<h2>👥 Teams</h2>
<p>Manage registered teams (coming in next part).</p>
</div>
<div class="card">

<h2>🎮 Tournament Settings</h2>

<label>Tournament Name</label><br>
<input type="text" id="tname" placeholder="BGMI SCRIMS">

<br><br>

<label>Entry Fee</label><br>
<input type="text" id="fee" placeholder="₹100">

<br><br>

<label>Prize Pool</label><br>
<input type="text" id="prize" placeholder="₹5000">

<br><br>

<label>Room ID</label><br>
<input type="text" id="roomid" placeholder="Room ID">

<br><br>

<label>Room Password</label><br>
<input type="text" id="roompass" placeholder="Password">

<br><br>

<button onclick="saveTournament()">Save Tournament</button>

</div>
</body>
</html>
