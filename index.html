<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:900;
color:#ff1a1a;
text-shadow:0 0 20px red;
}

nav a{
text-decoration:none;
color:#fff;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:red;
}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

background:
linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1800&q=80');

background-size:cover;

background-position:center;

}

.hero img{

width:230px;

filter:drop-shadow(0 0 30px red);

animation:float 3s infinite ease-in-out;

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}

}

.hero h1{

font-size:70px;

margin-top:20px;

color:red;

text-shadow:0 0 30px red;

}

.hero p{

margin:20px;

font-size:20px;

color:#ddd;

}

.btn{

display:inline-block;

padding:15px 35px;

background:red;

border-radius:10px;

color:white;

text-decoration:none;

font-weight:bold;

transition:.3s;

}

.btn:hover{

background:white;

color:red;

box-shadow:0 0 20px red;

}

section{

padding:90px 10%;

}

.title{

text-align:center;

font-size:40px;

margin-bottom:50px;

color:red;

}

.games{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}

.card{

background:#111;

padding:35px;

border:2px solid red;

border-radius:15px;

text-align:center;

transition:.4s;

}

.card:hover{

transform:translateY(-12px);

box-shadow:0 0 30px red;

}

footer{

background:#111;

padding:30px;

text-align:center;

border-top:2px solid red;

}

</style>

</head>
